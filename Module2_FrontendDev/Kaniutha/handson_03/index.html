<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h2>Student Portal</h2>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="hero">

            <h1>Welcome to the Student Portal</h1>

            <p>Manage your courses, profile and grades all in one place.</p>

            <button>Explore Courses</button>

        </section>

        <section id="controls">

            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <button id="sort-btn">
                Sort by Credits
            </button>

        </section>

        <section id="courses">

            <h2>Available Courses</h2>

            <!-- JavaScript will insert course cards here -->
            <div class="course-grid"></div>

            <p id="total-credits"></p>

            <div id="selected-course"></div>

        </section>

    </main>

    <footer>

        <p>&copy; 2026 Student Portal. All Rights Reserved.</p>

    </footer>

    <script type="module" src="app.js"></script>

</body>
</html>
